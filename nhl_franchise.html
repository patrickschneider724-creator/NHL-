];

// ===================== NAME POOLS =====================
const FN=['Alex','Jake','Ryan','Tyler','Jordan','Logan','Nathan','Kyle','Eric','Brett','Derek','Scott','Mike','Kevin','Chris','Matt','Justin','Adam','Aaron','Cody','Zach','Blake','Drew','Cole','Luke','Owen','Liam','Noah','Mason','Carter','Hunter','Dylan','Nikita','Andrei','Ivan','Dmitri','Pavel','Mikhail','Viktor','Erik','Henrik','Stefan','Patrik','Marcus','Oscar','Anton','Sebastian','Oliver','Felix','Lars','Sven','Nils','Gustav','Mathieu','Nicolas','Pierre','Maxime','Louis','Patrick','Connor','Sidney','James','David','Mark','Jason','Tyler','Cam','Jake','Sam','Ben','Dan','Jon','Will','Ryan','Kyle','Zach','Cale','Quinn','Jack','Nico'];
const LN=['Smith','Johnson','Williams','Brown','Jones','Miller','Davis','Wilson','Anderson','Taylor','Moore','Jackson','Martin','Lee','Thompson','White','Harris','Clark','Lewis','Hall','Young','King','Wright','Walker','Scott','Green','Baker','Adams','Nelson','Carter','Mitchell','Roberts','Turner','Phillips','Campbell','Parker','Evans','Edwards','Collins','Stewart','Petrov','Volkov','Kozlov','Morozov','Sokolov','Bergmann','Schneider','Fischer','Weber','Koch','Bauer','Lindqvist','Eriksson','Johansson','Larsson','Andersson','Dubois','Leclerc','Tremblay','Gauthier','Bouchard','Roy','Murphy','Kelly','Sullivan','Quinn','Walsh','Hayes','Cooper','Henderson','Reed','Foster','Russell','Griffin','Stone','Mercer','Foote','Sharp','Kane','Price','Ward','Sharp','Cross','Hart','Fox','Benn','Nash'];

// ===================== UTILITIES =====================
function rnd(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function rndF(min,max){return Math.random()*(max-min)+min;}
function dist(ax,ay,bx,by){return Math.sqrt((ax-bx)**2+(ay-by)**2);}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function randFrom(arr){return arr[Math.floor(Math.random()*arr.length)];}
function randName(){return randFrom(FN)+' '+randFrom(LN);}
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function poisson(lambda){let L=Math.exp(-lambda),k=0,p=1;do{k++;p*=Math.random();}while(p>L);return k-1;}
function teamById(id){return TEAMS.find(t=>t.id===id);}
function mkId(){return Math.random().toString(36).substr(2,9);}
function fmt$(v){return '$'+(v/1000000).toFixed(1)+'M';}
function fmtTime(s){const m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+(sec<10?'0':'')+sec;}

// ===================== PLAYER GENERATION =====================
function mkPlayer(pos,teamRating,isStar,starName){
  const base=teamRating+(isStar?8:0);
  const ovr=clamp(Math.round(base+(Math.random()*12-6)),55,99);
  const spd=clamp(ovr+(rnd(-8,8)),55,99);
  const sht=clamp(ovr+(rnd(-8,8)),55,99);
  const pas=clamp(ovr+(rnd(-8,8)),55,99);
  const def=clamp(ovr+(rnd(-8,8)),55,99);
  const gol=pos==='G'?clamp(ovr+(rnd(-5,5)),55,99):50;
  const sal=Math.round((ovr*75000+rndF(0,800000))/100000)*100000;
  return {
    id:mkId(),name:starName||randName(),pos,
    age:isStar?rnd(24,32):rnd(19,36),
    ovr,spd,sht,pas,def,gol,
    salary:sal,contract:rnd(1,7),
    num:rnd(1,98),isStar,prospect:false
  };
}

function mkRoster(td){
  const roster=[];
  const starPos=['C','RW','G'];
  td.stars.forEach((name,i)=>roster.push(mkPlayer(starPos[i]||'LW',td.r,true,name)));
  ['C','LW','RW','LW','RW','C','LW','RW','C'].forEach(p=>roster.push(mkPlayer(p,td.r,false)));
  ['LD','RD','LD','RD','LD','RD'].forEach(p=>roster.push(mkPlayer(p,td.r,false)));
  roster.push(mkPlayer('G',td.r,false));
  return roster;
}
// ===================== FRANCHISE MANAGER =====================
const FM={
  season:1,year:2025,myId:null,teams:{},schedule:[],
  freeAgents:[],prospects:[],phase:'regular',playoff:null,
  draftOrder:[],draftPick:0,draftRound:1,drafted:[],

  init(teamId){
    this.myId=teamId;
    this.teams={};
    TEAMS.forEach(td=>{
      const roster=mkRoster(td);
      const sal=roster.reduce((s,p)=>s+p.salary,0);
      this.teams[td.id]={
        id:td.id,city:td.city,name:td.name,conf:td.conf,div:td.div,
        p:td.p,s:td.s,r:td.r,roster,
        w:0,l:0,otl:0,gf:0,ga:0
      };
    });
    this.schedule=this.mkSchedule();
    this.genFAs();
    this.genProspects();
    this.phase='regular';
    this.season=1;this.year=2025;
  },

  mkSchedule(){
    const tids=Object.keys(this.teams);
    const pairs=[];
    for(let i=0;i<tids.length;i++)
      for(let j=i+1;j<tids.length;j++){
        pairs.push([tids[i],tids[j]]);
        pairs.push([tids[j],tids[i]]);
      }
    shuffle(pairs);
    const tg={};tids.forEach(t=>{tg[t]=0;});
    const sched=[];let gid=0;
    for(const [h,a] of pairs){
      if(tg[h]>=82||tg[a]>=82)continue;
      sched.push({id:gid++,home:h,away:a,played:false,hs:0,as:0,ot:false,so:false});
      tg[h]++;tg[a]++;
    }
    return sched.sort((a,b)=>a.id-b.id);
  },

  simGame(g){
    if(g.played)return;
    const h=this.teams[g.home],a=this.teams[g.away];
    const hs=h.r+2,as=a.r;
    const prob=hs/(hs+as);
    let hg=poisson(2.8*hs/83);
    let ag=poisson(2.8*as/83);
    if(hg===ag){
      g.ot=true;
      if(Math.random()<prob)hg++;else{ag++;if(Math.random()<0.45)g.so=true;}
    }
    g.hs=hg;g.as=ag;g.played=true;
    this.updateRec(g);
  },

  updateRec(g){
    const h=this.teams[g.home],a=this.teams[g.away];
    h.gf+=g.hs;h.ga+=g.as;a.gf+=g.as;a.ga+=g.hs;
    if(g.hs>g.as){h.w++;a.l++;}
    else if(g.as>g.hs){a.w++;if(g.ot||g.so){h.otl++;}else{h.l++;}}
  },

  myTeamObj(){return this.teams[this.myId];},
  pts(t){return t.w*2+t.otl;},

  nextMyGame(){
    return this.schedule.find(g=>!g.played&&(g.home===this.myId||g.away===this.myId));
  },

  simToNext(){
    const ng=this.nextMyGame();
    if(!ng)return;
    for(const g of this.schedule){
      if(g.id>=ng.id)break;
      if(!g.played)this.simGame(g);
    }
  },

  recordResult(hs,as,isHome){
    const ng=this.nextMyGame();
    if(!ng)return;
    ng.hs=isHome?hs:as;ng.as=isHome?as:hs;ng.played=true;
    this.updateRec(ng);
    this.save();
  },

  standings(){
    const s={E:{Atlantic:[],Metropolitan:[]},W:{Central:[],Pacific:[]}};
    Object.values(this.teams).forEach(t=>{
      if(s[t.conf]&&s[t.conf][t.div])s[t.conf][t.div].push(t);
    });
    const srt=(arr)=>arr.sort((a,b)=>this.pts(b)-this.pts(a)||(b.gf-b.ga)-(a.gf-a.ga));
    Object.keys(s).forEach(c=>Object.keys(s[c]).forEach(d=>srt(s[c][d])));
    return s;
  },

  playoffTeams(){
    const s=this.standings();
    const res={E:[],W:[]};
    ['E','W'].forEach(c=>{
      const divs=c==='E'?['Atlantic','Metropolitan']:['Central','Pacific'];
      const wc=[];
      divs.forEach(d=>{res[c].push(...s[c][d].slice(0,3));wc.push(...s[c][d].slice(3));});
      wc.sort((a,b)=>this.pts(b)-this.pts(a));
      res[c].push(...wc.slice(0,2));
    });
    return res;
  },

  seasonOver(){
    return this.schedule.filter(g=>g.home===this.myId||g.away===this.myId).every(g=>g.played);
  },

  startPlayoffs(){
    const teams=this.playoffTeams();
    this.phase='playoffs';
    // Build bracket: 1v8,2v7,3v6,4v5 in each conf
    const mkSeries=(h,a,conf,round)=>({id:mkId(),home:h.id,away:a.id,conf,round,hw:0,aw:0,games:[],done:false,winner:null});
    const east=teams.E,west=teams.W;
    this.playoff={
      round:1,
      E:[
        mkSeries(east[0],east[7],'E',1),mkSeries(east[1],east[6],'E',1),
        mkSeries(east[2],east[5],'E',1),mkSeries(east[3],east[4],'E',1)
      ],
      W:[
        mkSeries(west[0],west[7],'W',1),mkSeries(west[1],west[6],'W',1),
        mkSeries(west[2],west[5],'W',1),mkSeries(west[3],west[4],'W',1)
      ],
      SCF:null
    };
    this.save();
  },

  simPlayoffSeries(s){
    const h=this.teams[s.home],a=this.teams[s.away];
    const prob=(h.r+2)/(h.r+a.r+2);
    while(s.hw<4&&s.aw<4){
      const hg=poisson(2.8*(h.r+2)/83);
      const ag=poisson(2.8*a.r/83);
      if(hg>=ag){s.hw++;}else{s.aw++;}
    }
    s.done=true;s.winner=s.hw===4?s.home:s.away;
  },

  simAllPlayoffRound(conf){
    const series=conf==='SCF'?[this.playoff.SCF]:this.playoff[conf].filter(s=>s.round===this.playoff.round);
    series.forEach(s=>{if(!s.done)this.simPlayoffSeries(s);});
  },

  advancePlayoffs(){
    const pl=this.playoff;
    const mySeriesInConf=(conf)=>this.playoff[conf].filter(s=>s.round===pl.round&&(s.home===this.myId||s.away===this.myId));
    // Check if all series in current round done
    const allDone=(conf)=>this.playoff[conf].filter(s=>s.round===pl.round).every(s=>s.done);
    if(allDone('E')&&allDone('W')){
      if(pl.round<2){
        pl.round++;
        const ew=this.playoff.E.filter(s=>s.round===1&&s.done).map(s=>s.winner);
        const ww=this.playoff.W.filter(s=>s.round===1&&s.done).map(s=>s.winner);
        const mkS=(a,b,conf,r)=>{const ht=this.teams[a],at=this.teams[b];return{id:mkId(),home:a,away:b,conf,round:r,hw:0,aw:0,games:[],done:false,winner:null};};
        this.playoff.E.push(mkS(ew[0],ew[1],'E',2),mkS(ew[2],ew[3],'E',2));
        this.playoff.W.push(mkS(ww[0],ww[1],'W',2),mkS(ww[2],ww[3],'W',2));
      }else if(pl.round===2){
        pl.round=3;
        const ew=this.playoff.E.filter(s=>s.round===2&&s.done).map(s=>s.winner);
        const ww=this.playoff.W.filter(s=>s.round===2&&s.done).map(s=>s.winner);
        this.playoff.E.push({id:mkId(),home:ew[0],away:ew[1],conf:'E',round:3,hw:0,aw:0,games:[],done:false,winner:null});
        this.playoff.W.push({id:mkId(),home:ww[0],away:ww[1],conf:'W',round:3,hw:0,aw:0,games:[],done:false,winner:null});
      }else if(pl.round===3){
        const ecw=this.playoff.E.find(s=>s.round===3&&s.done);
        const wcw=this.playoff.W.find(s=>s.round===3&&s.done);
        if(ecw&&wcw){
          pl.SCF={id:mkId(),home:ecw.winner,away:wcw.winner,conf:'SCF',round:4,hw:0,aw:0,games:[],done:false,winner:null};
          pl.round=4;
        }
      }else if(pl.round===4&&pl.SCF&&pl.SCF.done){
        this.phase='offseason';
      }
    }
    this.save();
  },

  myPlayoffSeries(){
    if(!this.playoff)return null;
    const all=[...this.playoff.E,...this.playoff.W];
    if(this.playoff.SCF)all.push(this.playoff.SCF);
    return all.find(s=>(s.home===this.myId||s.away===this.myId)&&!s.done);
  },

  recordPlayoffResult(sid,hs,as,isHome){
    const all=[...this.playoff.E,...this.playoff.W];
    if(this.playoff.SCF)all.push(this.playoff.SCF);
    const s=all.find(x=>x.id===sid);
    if(!s)return;
    const hg=isHome?hs:as,ag=isHome?as:hs;
    if(hg>ag)s.hw++;else s.aw++;
    if(s.hw===4){s.done=true;s.winner=s.home;}
    else if(s.aw===4){s.done=true;s.winner=s.away;}
    if(s.done)this.advancePlayoffs();
    this.save();
  },

  genFAs(){
    this.freeAgents=[];
    const pos=['C','LW','RW','LD','RD','G'];
    for(let i=0;i<50;i++){
      const p=mkPlayer(randFrom(pos),72+rnd(0,10),false);
      p.salary=Math.round(p.salary*0.9/100000)*100000;
      this.freeAgents.push(p);
    }
  },

  genProspects(){
    this.prospects=[];
    for(let i=0;i<CFG.DRAFT_ROUNDS*32;i++){
      const pos=randFrom(['C','LW','RW','LD','RD']);
      const potential=clamp(85-Math.floor(i/32)*10+rnd(-5,8),55,95);
      const p=mkPlayer(pos,potential-8,false);
      p.age=rnd(18,21);p.prospect=true;
      p.potential=potential;
      this.prospects.push(p);
    }
  },

  capUsed(teamId){
    return(this.teams[teamId]?.roster||[]).reduce((s,p)=>s+p.salary,0);
  },
  capSpace(teamId){return CFG.CAP-this.capUsed(teamId);},

  signFA(pid){
    const pi=this.freeAgents.findIndex(p=>p.id===pid);
    if(pi<0)return'Not found';
    const p=this.freeAgents[pi];
    if(this.capSpace(this.myId)<p.salary)return'Not enough cap space';
    this.teams[this.myId].roster.push(p);
    this.freeAgents.splice(pi,1);
    this.save();return'ok';
  },

  releasePlayer(pid){
    const t=this.teams[this.myId];
    const i=t.roster.findIndex(p=>p.id===pid);
    if(i<0)return;
    const p=t.roster.splice(i,1)[0];
    p.salary=Math.round(p.salary*0.5/100000)*100000;
    this.freeAgents.push(p);
    this.save();
  },

  proposeTrade(myPid,theirId,theirPid){
    const mt=this.teams[this.myId],tt=this.teams[theirId];
    const mi=mt.roster.findIndex(p=>p.id===myPid);
    const ti=tt.roster.findIndex(p=>p.id===theirPid);
    if(mi<0||ti<0)return'Player not found';
    const mp=mt.roster[mi],tp=tt.roster[ti];
    const newMyCap=this.capUsed(this.myId)-mp.salary+tp.salary;
    if(newMyCap>CFG.CAP)return'Exceeds cap after trade';
    // CPU accepts if roughly even (within 10 OVR)
    if(Math.abs(mp.ovr-tp.ovr)>12&&tp.ovr>mp.ovr)return'CPU declined trade';
    mt.roster.splice(mi,1);tt.roster.splice(ti,1);
    mt.roster.push(tp);tt.roster.push(mp);
    this.save();return'ok';
  },

  startDraft(){
    // Order = reverse standings
    const s=this.standings();
    const allTeams=[...s.E.Atlantic,...s.E.Metropolitan,...s.W.Central,...s.W.Pacific];
    allTeams.sort((a,b)=>this.pts(a)-this.pts(b));
    this.draftOrder=allTeams.map(t=>t.id);
    this.draftPick=0;this.draftRound=1;this.drafted=[];
  },

  doDraftPick(pid){
    const pi=this.prospects.findIndex(p=>p.id===pid);
    if(pi<0)return;
    const p=this.prospects.splice(pi,1)[0];
    p.prospect=false;
    this.teams[this.myId].roster.push(p);
    this.drafted.push({round:this.draftRound,pick:this.draftPick+1,player:p});
    this.advanceDraft();
    this.save();
  },

  advanceDraft(){
    this.draftPick++;
    if(this.draftPick>=this.draftOrder.length){
      this.draftPick=0;this.draftRound++;
    }
    if(this.draftRound>CFG.DRAFT_ROUNDS){this.phase='offseason';return;}
    // Sim CPU picks until it's player's turn
    while(this.draftPick<this.draftOrder.length&&this.draftOrder[this.draftPick]!==this.myId){
      if(this.prospects.length>0){
        const p=this.prospects.splice(0,1)[0];
        p.prospect=false;
        const tId=this.draftOrder[this.draftPick];
        if(this.teams[tId])this.teams[tId].roster.push(p);
      }
      this.draftPick++;
      if(this.draftPick>=this.draftOrder.length){
        this.draftPick=0;this.draftRound++;
        if(this.draftRound>CFG.DRAFT_ROUNDS){this.phase='offseason';return;}
      }
    }
  },

  nextSeason(){
    this.season++;this.year++;
    // Age and retire
    Object.values(this.teams).forEach(t=>{
      t.roster=t.roster.filter(p=>{
        p.age++;
        if(p.age>=38&&Math.random()<0.4){this.freeAgents.push(p);return false;}
        if(p.age>=35)p.ovr=Math.max(55,p.ovr-rnd(1,3));
        p.contract--;
        if(p.contract<=0){
          if(t.id!==this.myId){p.contract=rnd(1,5);} // CPU re-signs
          else{this.freeAgents.push(p);return false;} // player team FAs expire
        }
        return true;
      });
      t.w=0;t.l=0;t.otl=0;t.gf=0;t.ga=0;
    });
    this.schedule=this.mkSchedule();
    this.genFAs();this.genProspects();
    this.phase='regular';this.playoff=null;
    this.save();
  },

  save(){
    try{localStorage.setItem('nhl_fm',JSON.stringify({
      season:this.season,year:this.year,myId:this.myId,
      teams:this.teams,schedule:this.schedule,
      freeAgents:this.freeAgents,prospects:this.prospects,
      phase:this.phase,playoff:this.playoff,
      draftOrder:this.draftOrder,draftPick:this.draftPick,
      draftRound:this.draftRound,drafted:this.drafted
    }));}catch(e){console.warn('Save failed',e);}
  },

  load(){
    try{
      const d=JSON.parse(localStorage.getItem('nhl_fm'));
      if(!d)return false;
      Object.assign(this,d);return true;
    }catch(e){return false;}
  },

  hasSave(){return!!localStorage.getItem('nhl_fm');},
  deleteSave(){localStorage.removeItem('nhl_fm');}
};

}

// ===================== ACTION HANDLER =====================
const APP={hubTab:'game',tradeSelect:{my:null,their:null},pendingGame:null,lastResult:null,playoffGameSid:null,playoffGameIsHome:false};

document.addEventListener('click',e=>{
  const el=e.target.closest('[data-action]');
  if(!el)return;
  e.preventDefault();e.stopPropagation();
  const action=el.dataset.action;
  const params=el.dataset.params?JSON.parse(el.dataset.params):{};
  handleAction(action,params);
});

function handleAction(action,p){
  switch(action){
    case 'newGame': showTeamSelect();break;
    case 'loadGame': if(FM.load())showFranchiseHub();else showMainMenu();break;
    case 'quickGame': APP.pendingGame={id:-1,home:'EDM',away:'TOR'};
      APP.isQuickGame=true;startGameplay();break;
    case 'deleteSave': FM.deleteSave();showMainMenu();break;
    case 'selectTeam':
      FM.init(p.id);FM.save();showFranchiseHub();break;
    case 'hubTab': showFranchiseHub(p.tab);break;
    case 'goHub': APP.tradeSelect={my:null,their:null};showFranchiseHub();break;
    case 'playNextGame': showPreGame();break;
    case 'simNextGame':
      FM.simToNext();const ng=FM.nextMyGame();
      if(ng){FM.simGame(ng);FM.save();}
      const ng2=FM.nextMyGame();
      if(ng2){
        const it=ng2.home===FM.myId;
        APP.lastResult={hs:ng2.hs,as:ng2.as,isHome:it,homeId:ng2.home,awayId:ng2.away,ot:ng2.ot,so:ng2.so};
      }else APP.lastResult=null;
      showPostGame();break;
    case 'simAndContinue':
      const g2=APP.pendingGame;if(!g2)break;
      FM.simGame(g2);FM.save();
      APP.lastResult={hs:g2.hs,as:g2.as,isHome:g2.home===FM.myId,homeId:g2.home,awayId:g2.away,ot:g2.ot,so:g2.so};
      showPostGame();break;
    case 'startPlayGame': startGameplay();break;
    case 'playSpecificGame':
      const sg=FM.schedule.find(x=>x.id===p.id);
      if(sg&&!sg.played){APP.pendingGame=sg;showPreGame(p.id);}break;
    case 'startPlayoffs':
      FM.schedule.filter(g=>!g.played).forEach(g=>FM.simGame(g));
      FM.startPlayoffs();showFranchiseHub('game');break;
    case 'showTrades': showTrades();break;
    case 'showTradeWith': showTradeWith(p.tid);break;
    case 'selectTradePlayer':
      if(p.side==='my')APP.tradeSelect.my=p.pid;
      else APP.tradeSelect.their=p.pid;
      showTradeWith(p.tid);break;
    case 'executeTrade':
      const tr=FM.proposeTrade(p.myPid,p.tid,p.theirPid);
      APP.tradeSelect={my:null,their:null};
      alert(tr==='ok'?'Trade completed!':'Trade failed: '+tr);
      showFranchiseHub('roster');break;
    case 'releasePlayer':
      if(confirm('Release this player?')){FM.releasePlayer(p.pid);showFranchiseHub('roster');}break;
    case 'showFreeAgency': showFreeAgency();break;
    case 'signFA':
      const res=FM.signFA(p.pid);
      if(res!=='ok')alert(res);
      showFreeAgency();break;
    case 'showDraft': showDraft();break;
    case 'draftPlayer': FM.doDraftPick(p.pid);showDraft();break;
    case 'simCPUPick':
      const ct=FM.draftOrder[FM.draftPick];
      if(ct&&ct!==FM.myId&&FM.prospects.length>0){
        const pp=FM.prospects.splice(0,1)[0];pp.prospect=false;
        if(FM.teams[ct])FM.teams[ct].roster.push(pp);
        FM.draftPick++;
        if(FM.draftPick>=FM.draftOrder.length){FM.draftPick=0;FM.draftRound++;}
        if(FM.draftRound>CFG.DRAFT_ROUNDS){FM.phase='offseason';FM.save();showFranchiseHub('manage');break;}
        FM.advanceDraft();FM.save();
      }
      showDraft();break;
    case 'nextSeason': FM.nextSeason();showFranchiseHub('game');break;
    case 'goOffseason': FM.phase='offseason';FM.save();showFranchiseHub('manage');break;
    case 'playPlayoffGame':
      APP.playoffGameSid=p.sid;APP.playoffGameIsHome=p.isHome;
      APP.pendingGame={id:-2,home:FM.playoff.E.concat(FM.playoff.W).concat(FM.playoff.SCF?[FM.playoff.SCF]:[]).find(s=>s.id===p.sid)?.home,away:FM.playoff.E.concat(FM.playoff.W).concat(FM.playoff.SCF?[FM.playoff.SCF]:[]).find(s=>s.id===p.sid)?.away};
      APP.isPlayoffGame=true;
      startGameplay();break;
    case 'simPlayoffGame':
      const pls=FM.playoff.E.concat(FM.playoff.W).concat(FM.playoff.SCF?[FM.playoff.SCF]:[]).find(s=>s.id===p.sid);
      if(pls)FM.simPlayoffSeries(pls);
      FM.advancePlayoffs();showFranchiseHub('game');break;
    case 'simAllPlayoff':
      if(FM.playoff){
        FM.playoff.E.forEach(s=>{if(!s.done)FM.simPlayoffSeries(s);});
        FM.playoff.W.forEach(s=>{if(!s.done)FM.simPlayoffSeries(s);});
        if(FM.playoff.SCF&&!FM.playoff.SCF.done)FM.simPlayoffSeries(FM.playoff.SCF);
        FM.advancePlayoffs();
      }
      showFranchiseHub('game');break;
    case 'viewTeamRoster': showTeamRoster(p.id);break;
    case 'showPlayoffs': showPlayoffs();break;
  }
}
// ===================== GAME ENGINE =====================
const canvas=$('gc');
const ctx=canvas.getContext('2d');
let animFrame=null;

const G={
  running:false,state:'faceoff',period:1,clock:CFG.PERIOD_SECS,
  hs:0,as:0,homeId:'',awayId:'',isPlayerHome:true,
  players:[],puck:null,controlled:null,
  lastTime:0,layout:null,
  joyActive:false,joyTid:-1,joyCX:0,joyCY:0,joyDX:0,joyDY:0,
  btnState:{shoot:false,pass:false,check:false},
  shootPressTime:0,shootCharging:false,shootCharge:0,
  bufferedShotUntil:0,puckTrail:[],screenShake:{x:0,y:0,timer:0},
  stateTimer:0,goalTeam:'',goalFlash:false,
  activeTouches:{},lastGoalCheck:0,
  ot:false,shootout:false,
};

function computeLayout(){
  const W=canvas.width,H=canvas.height;
  const ctrlH=Math.min(225,H*0.28);
  const hudH=52;
  const gameH=H-ctrlH;
  const availH=gameH-hudH;
  const scale=Math.min(W/RINK.W,availH/RINK.H);
  const rw=RINK.W*scale,rh=RINK.H*scale;
  const rx=(W-rw)/2;
  const ry=hudH+(availH-rh)/2;
  const jR=Math.min(55,ctrlH*0.42);
  const jX=W*0.18,jY=H-ctrlH*0.5;
  // 3-button layout: SHOOT (large, bottom-right), PASS/CHECK (above-left of SHOOT)
  const shootW=Math.min(110,W*0.26),shootH=Math.min(54,ctrlH*0.42);
  const shootX=W-shootW/2-W*0.05,shootY=H-shootH/2-ctrlH*0.14;
  const auxW=Math.min(90,W*0.21),auxH=Math.min(44,ctrlH*0.34);
  const auxX=shootX-shootW/2-auxW/2-10,auxY=shootY-shootH/2+auxH/2;
  // Face-off button (center)
  const foR=Math.min(32,ctrlH*0.26);
  const foX=W*0.50, foY=H-ctrlH*0.5;
  return{W,H,ctrlH,gameH,
    rink:{x:rx,y:ry,w:rw,h:rh,scale:scale},
    joy:{x:jX,y:jY,r:jR,kr:jR*0.38},
    faceoff:{x:foX,y:foY,r:foR},
    btns:{
      shoot:{x:shootX,y:shootY,w:shootW,h:shootH,label:'SHOOT',color:'#ff4444'},
      pass: {x:auxX,  y:auxY,  w:auxW,  h:auxH,  label:'PASS',  color:'#4a9eff'},
      check:{x:auxX,  y:auxY,  w:auxW,  h:auxH,  label:'CHECK', color:'#cc44cc'},
    }
  };
}

function gx(x){return G.layout.rink.x+x*G.layout.rink.scale;}
function gy(y){return G.layout.rink.y+y*G.layout.rink.scale;}
function gs(s){return s*G.layout.rink.scale;}

function mkGamePlayer(team,role,x,y,name,num,ovr,spd,sht,pas,def,gol,color){
  return{team,role,isGoalie:role==='G',isPlayer:false,
    x,y,vx:0,vy:0,name,num,ovr,spd,sht,pas,def,gol:gol||75,color,
    hasPuck:false,stunTimer:0,aiState:'idle',aiTarget:{x,y},startX:x,startY:y};
}

function startGameplay(){
  const pg=APP.pendingGame;
  const homeId=pg?pg.home:'EDM';
  const awayId=pg?pg.away:'TOR';
  const isPlayerHome=homeId===FM.myId;
  const ht=FM.teams[homeId]||{roster:[],r:80};
  const at=FM.teams[awayId]||{roster:[],r:80};
  const htd=teamById(homeId)||{p:'#003777',s:'#FF4C00'};
  const atd=teamById(awayId)||{p:'#00205B',s:'#FFFFFF'};

  G.running=true;G.state='faceoff';G.period=1;G.clock=CFG.PERIOD_SECS;
  G.hs=0;G.as=0;G.homeId=homeId;G.awayId=awayId;
  G.isPlayerHome=isPlayerHome;
  G.ot=false;G.shootout=false;
  G.stateTimer=2.5;G.players=[];G.activeTouches={};
  G.joyActive=false;G.joyDX=0;G.joyDY=0;
  Object.keys(G.btnState).forEach(k=>G.btnState[k]=false);
  G.shootCharging=false;G.shootCharge=0;G.shootPressTime=0;
  G.bufferedShotUntil=0;G.puckTrail=[];G.screenShake={x:0,y:0,timer:0};

  function getRoster(team,td){
    const r=team.roster||[];
    const fwd=r.filter(p=>['C','LW','RW'].includes(p.pos));
    const def=r.filter(p=>['LD','RD'].includes(p.pos));
    const gol=r.filter(p=>p.pos==='G');
    const c=fwd.find(p=>p.pos==='C')||fwd[0]||{name:'C',num:19,ovr:80,spd:80,sht:80,pas:80,def:75,gol:75};
    const lw=fwd.find(p=>p.pos==='LW')||fwd[1]||{name:'LW',num:18,ovr:78,spd:82,sht:78,pas:76,def:72,gol:75};
    const rw=fwd.find(p=>p.pos==='RW')||fwd[2]||{name:'RW',num:21,ovr:78,spd:80,sht:80,pas:75,def:72,gol:75};
    const ld=def.find(p=>p.pos==='LD')||def[0]||{name:'LD',num:4,ovr:76,spd:76,sht:72,pas:75,def:82,gol:75};
    const rd=def.find(p=>p.pos==='RD')||def[1]||{name:'RD',num:5,ovr:76,spd:76,sht:72,pas:75,def:82,gol:75};
    const g=gol[0]||{name:'G',num:31,ovr:80,spd:70,sht:60,pas:65,def:80,gol:85};
    return{c,lw,rw,ld,rd,g};
  }

  const hr=getRoster(ht,htd);const ar=getRoster(at,atd);
  const hc=htd.p,ac=atd.p;

  // Home team at bottom (y>100), attacks UP (toward y=0 goal)
  G.players=[
    mkGamePlayer('home','C',42.5,104,hr.c.name,hr.c.num,hr.c.ovr,hr.c.spd,hr.c.sht,hr.c.pas,hr.c.def,hr.c.gol,hc),
    mkGamePlayer('home','LW',18,114,hr.lw.name,hr.lw.num,hr.lw.ovr,hr.lw.spd,hr.lw.sht,hr.lw.pas,hr.lw.def,hr.lw.gol,hc),
    mkGamePlayer('home','RW',67,114,hr.rw.name,hr.rw.num,hr.rw.ovr,hr.rw.spd,hr.rw.sht,hr.rw.pas,hr.rw.def,hr.rw.gol,hc),
    mkGamePlayer('home','LD',25,140,hr.ld.name,hr.ld.num,hr.ld.ovr,hr.ld.spd,hr.ld.sht,hr.ld.pas,hr.ld.def,hr.ld.gol,hc),
    mkGamePlayer('home','RD',60,140,hr.rd.name,hr.rd.num,hr.rd.ovr,hr.rd.spd,hr.rd.sht,hr.rd.pas,hr.rd.def,hr.rd.gol,hc),
    mkGamePlayer('home','G',42.5,185,hr.g.name,hr.g.num,hr.g.ovr,hr.g.spd,hr.g.sht,hr.g.pas,hr.g.def,hr.g.gol,hc),
    // Away team at top (y<100), attacks DOWN (toward y=200 goal)
    mkGamePlayer('away','C',42.5,96,ar.c.name,ar.c.num,ar.c.ovr,ar.c.spd,ar.c.sht,ar.c.pas,ar.c.def,ar.c.gol,ac),
    mkGamePlayer('away','LW',18,86,ar.lw.name,ar.lw.num,ar.lw.ovr,ar.lw.spd,ar.lw.sht,ar.lw.pas,ar.lw.def,ar.lw.gol,ac),
    mkGamePlayer('away','RW',67,86,ar.rw.name,ar.rw.num,ar.rw.ovr,ar.rw.spd,ar.rw.sht,ar.rw.pas,ar.rw.def,ar.rw.gol,ac),
    mkGamePlayer('away','LD',25,60,ar.ld.name,ar.ld.num,ar.ld.ovr,ar.ld.spd,ar.ld.sht,ar.ld.pas,ar.ld.def,ar.ld.gol,ac),
    mkGamePlayer('away','RD',60,60,ar.rd.name,ar.rd.num,ar.rd.ovr,ar.rd.spd,ar.rd.sht,ar.rd.pas,ar.rd.def,ar.rd.gol,ac),
    mkGamePlayer('away','G',42.5,15,ar.g.name,ar.g.num,ar.g.ovr,ar.g.spd,ar.g.sht,ar.g.pas,ar.g.def,ar.g.gol,ac),
  ];

  // Mark player-controlled team
  const playerTeam=isPlayerHome?'home':'away';
  G.players.forEach(p=>{if(p.team===playerTeam&&!p.isGoalie)p.isPlayerTeam=true;});

  G.puck={x:42.5,y:100,vx:0,vy:0,carrier:null};
  G.controlled=null;
  updateControlled();

  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  G.layout=computeLayout();

  UI.style.display='none';
  canvas.style.display='block';
  initTouchHandlers();

  G.lastTime=performance.now();
  if(animFrame)cancelAnimationFrame(animFrame);
  animFrame=requestAnimationFrame(gameLoop);
}

function faceOff(x,y){
  x=x||42.5;y=y||100;
  G.puck.x=x;G.puck.y=y;G.puck.vx=0;G.puck.vy=0;G.puck.carrier=null;
  G.players.forEach(p=>{p.hasPuck=false;p.x=p.startX;p.y=p.startY;p.vx=0;p.vy=0;});
  G.state='faceoff';G.stateTimer=2.5;
  G.shootCharging=false;G.shootCharge=0;G.puckTrail=[];
  updateControlled();
}

function handleGoal(team){
  if(G.state==='goal')return;
  G.state='goal';G.stateTimer=2.5;G.goalTeam=team;
  if(team==='home')G.hs++;else G.as++;
  G.puck.carrier=null;G.players.forEach(p=>p.hasPuck=false);
  showGoalCelebration(team);
}

function showGoalCelebration(team){
  const td=teamById(team==='home'?G.homeId:G.awayId);
  const ov=document.createElement('div');
  ov.id='goverlay';
  ov.style.background=`${td.p}55`;
  ov.innerHTML=`<div class="gt">GOAL!<br><div style="font-size:22px;margin-top:8px;">${td.city}</div></div>`;
  document.body.appendChild(ov);
  setTimeout(()=>{const o=$('goverlay');if(o)o.remove();},2500);
}

function handlePeriodEnd(){
  if(G.period<CFG.PERIODS){
    G.period++;G.clock=CFG.PERIOD_SECS;G.state='faceoff';G.stateTimer=3;
    faceOff(42.5,100);
  }else{
    if(G.hs===G.as&&!G.ot){
      G.ot=true;G.clock=300;G.state='faceoff';G.stateTimer=3;
      faceOff(42.5,100);
    }else{
      G.state='game_end';G.stateTimer=3;
    }
  }
}

function handleGameEnd(){
  G.running=false;
  if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}
  removeTouchHandlers();
  const isHome=G.isPlayerHome;
  const hs=G.hs,as=G.as;
  APP.lastResult={hs,as,isHome,homeId:G.homeId,awayId:G.awayId,ot:G.ot,so:false};
  if(!APP.isQuickGame){
    if(APP.isPlayoffGame&&APP.playoffGameSid){
      FM.recordPlayoffResult(APP.playoffGameSid,hs,as,isHome);
      APP.isPlayoffGame=false;
      showFranchiseHub('game');return;
    }
    FM.recordResult(hs,as,isHome);
    APP.isQuickGame=false;
  }
  APP.pendingGame=null;
  showPostGame();
}

function drawRink(ctx,L){
  const{x:rx,y:ry,w:rw,h:rh,scale:sc}=L.rink;
  const cr=sc*9; // corner radius
  // Ice fill
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(rx+cr,ry);
  ctx.lineTo(rx+rw-cr,ry);ctx.arcTo(rx+rw,ry,rx+rw,ry+cr,cr);
  ctx.lineTo(rx+rw,ry+rh-cr);ctx.arcTo(rx+rw,ry+rh,rx+rw-cr,ry+rh,cr);
  ctx.lineTo(rx+cr,ry+rh);ctx.arcTo(rx,ry+rh,rx,ry+rh-cr,cr);
  ctx.lineTo(rx,ry+cr);ctx.arcTo(rx,ry,rx+cr,ry,cr);
  ctx.closePath();
  ctx.fillStyle='#d8eef7';ctx.fill();
  ctx.strokeStyle='#1a2035';ctx.lineWidth=3;ctx.stroke();
  ctx.clip();

  // Goalie creases
  const glx=gx(RINK.W/2),gcr=gs(RINK.CR_R),gcd=gs(RINK.CR_D);
  // Top crease (away goal)
  ctx.fillStyle='rgba(173,216,230,0.5)';
  ctx.beginPath();ctx.ellipse(glx,gy(RINK.GL_TOP),gcr,gcd,0,0,Math.PI,false);ctx.fill();
  ctx.strokeStyle='#c00';ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(glx,gy(RINK.GL_TOP),gcr,gcd,0,0,Math.PI,false);ctx.stroke();
  // Bottom crease (home goal)
  ctx.fillStyle='rgba(173,216,230,0.5)';
  ctx.beginPath();ctx.ellipse(glx,gy(RINK.GL_BOT),gcr,gcd,0,Math.PI,2*Math.PI,false);ctx.fill();
  ctx.strokeStyle='#c00';ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(glx,gy(RINK.GL_BOT),gcr,gcd,0,Math.PI,2*Math.PI,false);ctx.stroke();

  // Center circle
  ctx.strokeStyle='#c00';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(gx(42.5),gy(100),gs(15),0,Math.PI*2);ctx.stroke();
  // Center dot
  ctx.fillStyle='#c00';ctx.beginPath();ctx.arc(gx(42.5),gy(100),gs(1.2),0,Math.PI*2);ctx.fill();

  // Face-off dots
  const foDots=[
    [20,72],[65,72],[20,128],[65,128]
  ];
  foDots.forEach(([fx,fy])=>{
    ctx.strokeStyle='#c00';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(gx(fx),gy(fy),gs(6),0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='#c00';ctx.beginPath();ctx.arc(gx(fx),gy(fy),gs(1),0,Math.PI*2);ctx.fill();
  });

  // Blue lines
  ctx.strokeStyle='#1e3fa4';ctx.lineWidth=gs(2);
  ctx.beginPath();ctx.moveTo(rx,gy(RINK.BL_TOP));ctx.lineTo(rx+rw,gy(RINK.BL_TOP));ctx.stroke();
  ctx.beginPath();ctx.moveTo(rx,gy(RINK.BL_BOT));ctx.lineTo(rx+rw,gy(RINK.BL_BOT));ctx.stroke();

  // Center red line
  ctx.strokeStyle='#c00';ctx.lineWidth=gs(1.5);
  ctx.setLineDash([gs(3),gs(2)]);
  ctx.beginPath();ctx.moveTo(rx,gy(RINK.CTR));ctx.lineTo(rx+rw,gy(RINK.CTR));ctx.stroke();
  ctx.setLineDash([]);

  // Goal lines
  ctx.strokeStyle='#c00';ctx.lineWidth=gs(1.5);
  ctx.beginPath();ctx.moveTo(rx,gy(RINK.GL_TOP));ctx.lineTo(rx+rw,gy(RINK.GL_TOP));ctx.stroke();
  ctx.beginPath();ctx.moveTo(rx,gy(RINK.GL_BOT));ctx.lineTo(rx+rw,gy(RINK.GL_BOT));ctx.stroke();

  // Goals (nets)
  const goalLX=gx((RINK.W-RINK.GOAL_W)/2),goalRX=gx((RINK.W+RINK.GOAL_W)/2);
  const gnetD=gs(RINK.GOAL_D);
  ctx.strokeStyle='#888';ctx.lineWidth=gs(1.2);
  // Top goal
  ctx.strokeRect(goalLX,gy(RINK.GL_TOP)-gnetD,goalRX-goalLX,gnetD);
  // Bottom goal
  ctx.strokeRect(goalLX,gy(RINK.GL_BOT),goalRX-goalLX,gnetD);

  ctx.restore();
}

function drawPlayerSprite(ctx,p,px,py,pr,isControlled){
  const spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
  // Rotation: local -Y axis points in velocity direction
  // formula: atan2(vx, -vy)
  const angle=spd>0.12?Math.atan2(p.vx,-p.vy):(p.team==='home'?0:Math.PI);
  const jColor=p.stunTimer>0?'#666':p.color;
  const bodyW=pr*1.15,bodyH=pr*1.35;
  const headR=pr*0.52,headY=-(bodyH*0.5+headR*0.55);

  // Gold puck-possession glow (world space, drawn first so it's under sprite)
  if(p.hasPuck){
    ctx.fillStyle='rgba(255,200,0,0.22)';
    ctx.beginPath();ctx.arc(px,py,pr*2.2,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#ffd700';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(px,py,pr*2.2,0,Math.PI*2);ctx.stroke();
  }

  ctx.save();
  ctx.translate(px,py);

  // Ground shadow
  ctx.fillStyle='rgba(0,0,0,0.18)';
  ctx.beginPath();ctx.ellipse(0,pr*0.6,pr*0.85,pr*0.28,0,0,Math.PI*2);ctx.fill();

  ctx.rotate(angle);

  // Hockey stick (extends forward-right of body)
  if(!p.isGoalie){
    ctx.strokeStyle='#6b3a1f';ctx.lineWidth=Math.max(1.5,pr*0.2);ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(bodyW*0.48,-bodyH*0.15);
    ctx.lineTo(bodyW*0.52,bodyH*0.75);
    ctx.lineTo(bodyW*1.05,bodyH*1.05);
    ctx.stroke();
    // Blade highlight
    ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=Math.max(1,pr*0.12);
    ctx.beginPath();ctx.moveTo(bodyW*0.78,bodyH*0.95);ctx.lineTo(bodyW*1.05,bodyH*1.05);ctx.stroke();
  }

  // Jersey body
  ctx.fillStyle=jColor;
  roundRect(ctx,-bodyW/2,-bodyH/2,bodyW,bodyH,pr*0.28);ctx.fill();
  // Away team white outline
  if(p.team==='away'){ctx.strokeStyle='rgba(255,255,255,0.8)';ctx.lineWidth=Math.max(1,pr*0.18);ctx.stroke();}
  // Jersey shoulder stripes
  ctx.fillStyle='rgba(255,255,255,0.15)';
  ctx.fillRect(-bodyW/2,-bodyH/2,bodyW,pr*0.28);

  // Jersey number
  ctx.fillStyle='#fff';ctx.font=`bold ${Math.max(6,Math.round(pr*0.62))}px Arial`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(p.num,0,bodyH*0.05);

  // Head (skin)
  ctx.fillStyle='#f5c5a3';
  ctx.beginPath();ctx.arc(0,headY,headR,0,Math.PI*2);ctx.fill();
  // Helmet (team color, top half)
  ctx.fillStyle=jColor;
  ctx.beginPath();ctx.arc(0,headY,headR,Math.PI,0);ctx.fill();
  // Helmet chin strap
  ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=Math.max(1,pr*0.1);
  ctx.beginPath();ctx.arc(0,headY,headR,0,Math.PI);ctx.stroke();
  // Visor glint
  ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=Math.max(1,pr*0.13);
  ctx.beginPath();ctx.arc(0,headY,headR*0.65,Math.PI*0.15,Math.PI*0.75);ctx.stroke();

  // Goalie leg pads (wider white rects either side)
  if(p.isGoalie){
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.fillRect(-bodyW*0.85,0,bodyW*0.3,bodyH*0.65);
    ctx.fillRect(bodyW*0.55,0,bodyW*0.3,bodyH*0.65);
    ctx.strokeStyle='rgba(200,200,200,0.6)';ctx.lineWidth=1;
    ctx.strokeRect(-bodyW*0.85,0,bodyW*0.3,bodyH*0.65);
    ctx.strokeRect(bodyW*0.55,0,bodyW*0.3,bodyH*0.65);
  }

  ctx.restore();

  // Controlled player ring (world space)
  if(isControlled){
    ctx.strokeStyle='#fff';ctx.lineWidth=gs(0.8)+1;
    ctx.beginPath();ctx.arc(px,py,pr+gs(1.0),0,Math.PI*2);ctx.stroke();
  }

  // Shoot charge ring (world space)
  if(isControlled&&G.shootCharging&&G.shootCharge>0){
    const pct=Math.min(G.shootCharge/CFG.SLAP_THRESHOLD,1);
    ctx.strokeStyle=pct>=1?'#ff2222':'#ffaa00';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(px,py,pr+gs(1.8),-Math.PI/2,-Math.PI/2+Math.PI*2*pct);ctx.stroke();
  }

  // Stun stars (world space)
  if(p.stunTimer>0){
    for(let i=0;i<3;i++){
      const sa=(Date.now()/200)+i*(Math.PI*2/3);
      const sx=px+Math.cos(sa)*pr*1.8,sy=py+Math.sin(sa)*pr*1.8-gs(0.5);
      ctx.fillStyle='#ff0';ctx.font=`${gs(1.5)}px Arial`;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('*',sx,sy);
    }
  }
}

function drawPlayers(ctx,L){
  G.players.forEach(p=>{
    const px=gx(p.x),py=gy(p.y);
    const pr=gs(CFG.P_R);
    drawPlayerSprite(ctx,p,px,py,pr,p===G.controlled);
  });
}

function drawPuck(ctx,L){
  const p=G.puck;
  // Draw trail
  const trail=G.puckTrail;
  for(let i=0;i<trail.length;i++){
    const alpha=(i/trail.length)*0.35;
    ctx.globalAlpha=alpha;
    ctx.fillStyle='#aaa';
    ctx.beginPath();ctx.arc(gx(trail[i].x),gy(trail[i].y),Math.max(2,gs(0.35)),0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  const px=gx(p.x),py=gy(p.y);
  const pr=gs(RINK.PUCK_R||0.5);
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.arc(px,py,Math.max(4,pr),0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#444';ctx.lineWidth=1;ctx.stroke();
}

function drawHUD(ctx,L){
  const{W,H,ctrlH,gameH}=L;
  const hudH=50;
  // HUD background
  ctx.fillStyle='rgba(5,8,20,0.92)';
  ctx.fillRect(0,0,W,hudH);
  ctx.fillStyle='rgba(255,255,255,0.1)';
  ctx.fillRect(0,hudH-1,W,1);

  const htd=teamById(G.homeId)||{p:'#555',id:'HOM'};
  const atd=teamById(G.awayId)||{p:'#555',id:'AWY'};
  const isMe=(team)=>(team==='home'&&G.isPlayerHome)||(team==='away'&&!G.isPlayerHome);

  // Home team
  ctx.fillStyle=htd.p;ctx.beginPath();ctx.arc(40,hudH/2,12,0,Math.PI*2);ctx.fill();

  ctx.fillText(htd.id,40,hudH/2);
  ctx.font=`bold 28px Arial`;ctx.textAlign='center';
  ctx.fillStyle=isMe('home')?'#4a9eff':'#fff';
  ctx.fillText(G.hs,W/2-35,hudH/2+1);

  // Separator
  ctx.fillStyle='#555';ctx.fillRect(W/2-6,8,1,hudH-16);ctx.fillRect(W/2+6,8,1,hudH-16);

  // Period & clock
  const cStr=G.state==='game_end'?'FINAL':G.state==='faceoff'?'Face-off':fmtTime(G.clock);
  ctx.fillStyle='#fff';ctx.font='bold 15px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(`P${G.period}${G.ot?' OT':''}`,W/2,hudH/2-8);
  ctx.font='bold 14px -apple-system,Arial';ctx.fillStyle='#fbbf24';
  ctx.fillText(cStr,W/2,hudH/2+9);

  // Away team
  ctx.fillStyle=atd.p;ctx.beginPath();ctx.arc(W-40,hudH/2,12,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 10px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(atd.id,W-40,hudH/2);
  ctx.font='bold 28px Arial';ctx.textAlign='center';
  ctx.fillStyle=isMe('away')?'#4a9eff':'#fff';
  ctx.fillText(G.as,W/2+35,hudH/2+1);

  // State overlays
  if(G.state==='faceoff'&&G.stateTimer>0){
    ctx.fillStyle='rgba(0,0,0,0.5)';

    ctx.fillStyle='#fff';ctx.font='bold 32px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(`Period ${G.period}${G.ot?' OT':''}`,W/2,gameH/2);
    ctx.font='18px Arial';ctx.fillStyle='#9ca3af';
    ctx.fillText('Face-off',W/2,gameH/2+40);
  }
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function drawControls(ctx,L){
  const{W,H,ctrlH,btns,joy,faceoff}=L;
  // Control area background
  ctx.fillStyle='rgba(5,8,20,0.92)';
  ctx.fillRect(0,H-ctrlH,W,ctrlH);
  ctx.fillStyle='rgba(255,255,255,0.08)';
  ctx.fillRect(0,H-ctrlH,W,1);

  // Joystick base
  ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(joy.x,joy.y,joy.r,0,Math.PI*2);ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(joy.x-joy.r,joy.y);ctx.lineTo(joy.x+joy.r,joy.y);ctx.stroke();
  ctx.beginPath();ctx.moveTo(joy.x,joy.y-joy.r);ctx.lineTo(joy.x,joy.y+joy.r);ctx.stroke();
  const kx=joy.x+G.joyDX*joy.r,ky=joy.y+G.joyDY*joy.r;
  ctx.fillStyle='rgba(255,255,255,0.45)';
  ctx.beginPath();ctx.arc(kx,ky,joy.kr,0,Math.PI*2);ctx.fill();

  // Determine if controlled player has puck
  const hp=G.controlled&&G.controlled.hasPuck;

  // Draw SHOOT button (always visible)
  {
    const b=btns.shoot;
    const pressed=G.btnState.shoot;
    const scale=pressed?0.9:1;
    ctx.save();
    ctx.translate(b.x,b.y);ctx.scale(scale,scale);ctx.translate(-b.x,-b.y);
    ctx.globalAlpha=pressed?1:0.82;
    // Charge fill background
    if(G.shootCharging&&G.shootCharge>0){
      const pct=Math.min(G.shootCharge/CFG.SLAP_THRESHOLD,1);
      ctx.fillStyle=pct>=1?'#8b0000':'#3a0000';
      roundRect(ctx,b.x-b.w/2,b.y-b.h/2,b.w,b.h,10);ctx.fill();
      ctx.fillStyle=pct>=1?'#ff2222':'#ff7700';
      roundRect(ctx,b.x-b.w/2,b.y-b.h/2,b.w*pct,b.h,10);ctx.fill();
    }else{
      ctx.fillStyle='rgba(120,0,0,0.88)';
      roundRect(ctx,b.x-b.w/2,b.y-b.h/2,b.w,b.h,10);ctx.fill();
    }
    ctx.strokeStyle=b.color;ctx.lineWidth=pressed?3:2;
    roundRect(ctx,b.x-b.w/2,b.y-b.h/2,b.w,b.h,10);ctx.stroke();
    ctx.globalAlpha=1;
    ctx.fillStyle='#fff';
    ctx.font=`bold ${Math.round(b.h*0.42)}px -apple-system,Arial`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(b.label,b.x,b.y);
    if(G.shootCharging&&G.shootCharge>=CFG.SLAP_THRESHOLD){
      ctx.fillStyle='#ff0';ctx.font=`bold ${Math.round(b.h*0.3)}px Arial`;
      ctx.fillText('SLAP!',b.x,b.y+b.h/2+10);
    }
    ctx.restore();
  }

  // Draw PASS (hasPuck) or CHECK (!hasPuck) — context-sensitive
  {
    const b=hp?btns.pass:btns.check;
    const name=hp?'pass':'check';
    const pressed=G.btnState[name];
    const scale=pressed?0.9:1;
    ctx.save();
    ctx.translate(b.x,b.y);ctx.scale(scale,scale);ctx.translate(-b.x,-b.y);
    ctx.globalAlpha=pressed?1:0.82;
    ctx.fillStyle=pressed?`${b.color}44`:'rgba(10,15,35,0.9)';
    roundRect(ctx,b.x-b.w/2,b.y-b.h/2,b.w,b.h,8);ctx.fill();
    ctx.strokeStyle=b.color;ctx.lineWidth=pressed?3:2;
    roundRect(ctx,b.x-b.w/2,b.y-b.h/2,b.w,b.h,8);ctx.stroke();
    ctx.globalAlpha=1;
    ctx.fillStyle=pressed?'#fff':b.color;
    ctx.font=`bold ${Math.round(b.h*0.4)}px -apple-system,Arial`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(b.label,b.x,b.y);
    ctx.restore();
  }

  // Face-off button — pulsing gold, shown when waiting for face-off
  if(G.state==='faceoff'){
    const pulse=0.65+0.35*Math.abs(Math.sin(Date.now()/400));
    ctx.globalAlpha=pulse;
    ctx.fillStyle='#fbbf24';
    ctx.beginPath();ctx.arc(faceoff.x,faceoff.y,faceoff.r,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(faceoff.x,faceoff.y,faceoff.r,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;
    ctx.fillStyle='#000';
    ctx.font=`bold ${Math.round(faceoff.r*0.38)}px -apple-system,Arial`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('FACE-OFF',faceoff.x,faceoff.y);
  }
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function render(){
  const ctx2=ctx;const L=G.layout;
  if(!L)return;
  ctx2.clearRect(0,0,L.W,L.H);
  // Background
  ctx2.fillStyle='#080c18';ctx2.fillRect(0,0,L.W,L.H);
  // Screen shake
  const sk=G.screenShake;
  if(sk.timer>0){ctx2.save();ctx2.translate(sk.x,sk.y);}
  drawRink(ctx2,L);
  drawPlayers(ctx2,L);
  if(!G.puck.carrier||(G.puck.carrier&&!G.puck.carrier.isGoalie))drawPuck(ctx2,L);
  if(sk.timer>0){ctx2.restore();}
  drawHUD(ctx2,L);
  drawControls(ctx2,L);
}
// ===================== PHYSICS =====================
function updatePhysics(dt){
  const puck=G.puck;
  // Puck moves with carrier
  if(puck.carrier){
    puck.x=puck.carrier.x;puck.y=puck.carrier.y;
    puck.vx=puck.carrier.vx;puck.vy=puck.carrier.vy;
  }else{
    puck.x+=puck.vx;puck.y+=puck.vy;
    puck.vx*=CFG.PUCK_FRIC;puck.vy*=CFG.PUCK_FRIC;
    // Wall bounce
    const gL=(RINK.W-RINK.GOAL_W)/2,gR=gL+RINK.GOAL_W;
    const margin=1.5;
    if(puck.x<margin){puck.x=margin;puck.vx=Math.abs(puck.vx)*0.65;}
    if(puck.x>RINK.W-margin){puck.x=RINK.W-margin;puck.vx=-Math.abs(puck.vx)*0.65;}
    // Top wall
    if(puck.y<margin){
      if(puck.x>=gL&&puck.x<=gR){checkGoal('top');}
      else{puck.y=margin;puck.vy=Math.abs(puck.vy)*0.65;}
    }
    // Bottom wall
    if(puck.y>RINK.H-margin){
      if(puck.x>=gL&&puck.x<=gR){checkGoal('bot');}
      else{puck.y=RINK.H-margin;puck.vy=-Math.abs(puck.vy)*0.65;}
    }
    // Goal line check (puck crossing goal line)
    if(puck.y<=RINK.GL_TOP&&puck.vy<0&&puck.x>=gL&&puck.x<=gR){
      checkGoal('top');
    }
    if(puck.y>=RINK.GL_BOT&&puck.vy>0&&puck.x>=gL&&puck.x<=gR){
      checkGoal('bot');
    }
  }

  // Update players
  G.players.forEach(p=>{
    if(p.stunTimer>0){
      p.stunTimer-=dt;
      p.vx*=0.9;p.vy*=0.9;
    }
    p.x=clamp(p.x+p.vx,RINK.P_R||2.5,RINK.W-(RINK.P_R||2.5));
    p.y=clamp(p.y+p.vy,RINK.P_R||2.5,RINK.H-(RINK.P_R||2.5));
    if(!p.hasPuck&&p.stunTimer<=0){
      p.vx*=CFG.FRICTION;p.vy*=CFG.FRICTION;
    }
  });

  // Pickup check
  if(!puck.carrier){
    let closest=null,closestD=CFG.PICKUP_R;
    G.players.forEach(p=>{
      if(p.isGoalie||p.stunTimer>0)return;
      const d=dist(p.x,p.y,puck.x,puck.y);
      if(d<closestD){closestD=d;closest=p;}
    });
    if(closest){
      closest.hasPuck=true;puck.carrier=closest;puck.vx=0;puck.vy=0;
    }
  }
}

function checkGoal(side){
  if(G.state==='goal'||G.state==='game_end'||G.state==='faceoff')return;
  G.lastGoalCheck=G.lastGoalCheck||0;
  const now=Date.now();
  if(now-G.lastGoalCheck<1000)return;
  G.lastGoalCheck=now;
  // top goal = away team defends = home team scores
  // bot goal = home team defends = away team scores
  const scoringTeam=side==='top'?'home':'away';
  handleGoal(scoringTeam);
}

// ===================== AI SYSTEM =====================
function getAttackY(team){return team==='home'?RINK.GL_TOP:RINK.GL_BOT;}
function getDefendY(team){return team==='home'?RINK.GL_BOT:RINK.GL_TOP;}

function getDefaultPos(role,team){
  const isHome=team==='home';
  const positions={
    'C':{x:42.5,y:isHome?105:95},
    'LW':{x:18,y:isHome?115:85},
    'RW':{x:67,y:isHome?115:85},
    'LD':{x:25,y:isHome?140:60},
    'RD':{x:60,y:isHome?140:60},
    'G':{x:42.5,y:isHome?185:15},
  };
  return positions[role]||{x:42.5,y:isHome?100:100};
}

function updateAllAI(dt){
  G.players.forEach(p=>{
    if(p===G.controlled||p.stunTimer>0)return;
    if(p.isGoalie)updateGoalieAI(p,dt);
    else updateSkaterAI(p,dt);
  });
}

function updateSkaterAI(p,dt){
  const puck=G.puck;
  const puckCarrier=G.players.find(x=>x.hasPuck);
  const attackY=getAttackY(p.team);
  const defendY=getDefendY(p.team);
  let tx=p.x,ty=p.y;

  if(!puckCarrier){
    // Loose puck - closest chases, others position
    let closestD=999;
    G.players.filter(x=>x.team===p.team&&!x.isGoalie&&!x.isPlayer).forEach(x=>{
      const d=dist(x.x,x.y,puck.x,puck.y);if(d<closestD)closestD=d;
    });
    const myD=dist(p.x,p.y,puck.x,puck.y);
    if(myD<=closestD+3){tx=puck.x;ty=puck.y;}
    else{const dp=getDefaultPos(p.role,p.team);tx=dp.x;ty=dp.y;}
  }else if(puckCarrier.team===p.team){
    if(puckCarrier===p){
      // I have the puck - attack!
      const goalX=42.5+(Math.random()-0.5)*12;
      const goalDist=Math.abs(p.y-attackY);
      if(goalDist<45&&Math.random()<0.025){aiShoot(p);}
      tx=goalX;ty=attackY+(p.team==='home'?25:-25);
    }else{
      // Support - move to open position
      const side=p.role==='LW'?-1:p.role==='RW'?1:0;
      const fwdOffset=p.team==='home'?-30:30;
      tx=clamp(puckCarrier.x+side*20,5,80);
      ty=clamp(puckCarrier.y+fwdOffset,-5,RINK.H+5);
    }
  }else{
    // Opponents have puck - defend or pressure
    const d=dist(p.x,p.y,puckCarrier.x,puckCarrier.y);
    if(d<CFG.POKE_R&&Math.random()<0.04)aiPokeCheck(p,puckCarrier);
    if(d<CFG.CHECK_R&&Math.random()<0.025)aiBodyCheck(p,puckCarrier);
    if(d<30){tx=puckCarrier.x;ty=puckCarrier.y;}
    else{
      const dp=getDefaultPos(p.role,p.team);
      const mixX=(puckCarrier.x+dp.x)/2;
      const mixY=(puckCarrier.y+dp.y)/2;
      tx=mixX+(dp.x-mixX)*0.5;ty=mixY+(dp.y-mixY)*0.5;
    }
  }

  // Move toward target
  const tdx=tx-p.x,tdy=ty-p.y;
  const td=Math.sqrt(tdx*tdx+tdy*tdy);
  const spd=CFG.AI_SPD;
  if(td>0.8){
    const ns=Math.min(spd,td);
    p.vx+=(tdx/td*ns-p.vx)*0.25;
    p.vy+=(tdy/td*ns-p.vy)*0.25;
  }else{p.vx*=0.7;p.vy*=0.7;}
}

function updateGoalieAI(goalie,dt){
  const puck=G.puck;
  const defY=getDefendY(goalie.team);
  const isTopGoalie=goalie.team==='away';
  // Track puck X, stay near goal
  const targetX=clamp(puck.x,(RINK.W-RINK.GOAL_W)/2-2,(RINK.W+RINK.GOAL_W)/2+2);
  const targetY=isTopGoalie?clamp(puck.y+8,defY,defY+RINK.CR_D):clamp(puck.y-8,defY-RINK.CR_D,defY);
  const clampedY=isTopGoalie?Math.min(defY+RINK.CR_D,Math.max(defY,targetY)):Math.max(defY-RINK.CR_D,Math.min(defY,targetY));

  const tdx=targetX-goalie.x,tdy=clampedY-goalie.y;
  const td=Math.sqrt(tdx*tdx+tdy*tdy);
  if(td>0.5){
    const ns=Math.min(CFG.GOALIE_SPD,td);
    goalie.vx+=(tdx/td*ns-goalie.vx)*0.3;
    goalie.vy+=(tdy/td*ns-goalie.vy)*0.3;
  }

  // Save attempt - check if fast puck heading toward goal
  const puckSpd=Math.sqrt(puck.vx**2+puck.vy**2);
  const puckHeadingAtGoal=isTopGoalie?(puck.vy<-3):(puck.vy>3);
  if(!puck.carrier&&puckSpd>5&&puckHeadingAtGoal){
    const d=dist(goalie.x,goalie.y,puck.x,puck.y);
    if(d<10){
      const angleOff=Math.abs(puck.x-42.5)/42.5;
      const goalieRating=(goalie.gol||80)/100;
      const spdFactor=Math.max(0.55,1-(puckSpd-8)/30);
      const angFactor=0.7+angleOff*0.3;
      const posAdj=Math.max(0.5,1-Math.abs(goalie.x-puck.x)/8);
      const saveProb=goalieRating*spdFactor*angFactor*posAdj;
      if(Math.random()<saveProb){
        // Save! Deflect puck
        puck.vx=(Math.random()-0.5)*5;
        puck.vy=(isTopGoalie?1:-1)*3;
        puck.carrier=null;
      }
    }
  }
}

function aiShoot(p){
  if(!p.hasPuck)return;
  const targetY=getAttackY(p.team);
  const targetX=42.5+(Math.random()-0.5)*(RINK.GOAL_W*0.8);
  const dx=targetX-p.x,dy=targetY-p.y;
  const d=Math.sqrt(dx*dx+dy*dy)||1;
  const spd=CFG.WRIST_SPD*(0.8+Math.random()*0.4);
  const inac=(100-p.sht)/100*3;
  G.puck.vx=(dx/d)*spd+(Math.random()-0.5)*inac;
  G.puck.vy=(dy/d)*spd+(Math.random()-0.5)*inac;
  G.puck.carrier=null;p.hasPuck=false;
}

function aiPokeCheck(p,carrier){
  if(!carrier.hasPuck)return;
  const prob=0.35+(p.def/300);
  if(Math.random()<prob){
    carrier.hasPuck=false;G.puck.carrier=null;
    G.puck.vx=(Math.random()-0.5)*5;
    G.puck.vy=(p.team==='home'?-1:1)*(2+Math.random()*3);
  }
}

function aiBodyCheck(p,carrier){
  if(!carrier.hasPuck)return;
  const prob=0.3+(p.def/400);
  if(Math.random()<prob){
    carrier.hasPuck=false;G.puck.carrier=null;
    G.puck.vx=(Math.random()-0.5)*7;G.puck.vy=(Math.random()-0.5)*7;
    carrier.stunTimer=1.2;
    const dx=carrier.x-p.x,dy=carrier.y-p.y;
    const d=Math.sqrt(dx*dx+dy*dy)||1;
    carrier.vx=(dx/d)*5;carrier.vy=(dy/d)*5;
  }
}
// ===================== PLAYER ACTIONS =====================
function updateControlled(){
  const pt=G.isPlayerHome?'home':'away';
  const pc=G.players.find(p=>p.hasPuck&&p.team===pt);
  if(pc){G.controlled=pc;return;}
  const cands=G.players.filter(p=>p.team===pt&&!p.isGoalie&&p.stunTimer<=0);
  if(!cands.length)return;
  G.controlled=cands.reduce((a,b)=>
    dist(a.x,a.y,G.puck.x,G.puck.y)<dist(b.x,b.y,G.puck.x,G.puck.y)?a:b
  );
}

function moveControlled(dt){
  const p=G.controlled;if(!p)return;
  if(G.joyActive&&(Math.abs(G.joyDX)>0.08||Math.abs(G.joyDY)>0.08)){
    const spd=CFG.MAX_SPD*(p.spd/100*0.4+0.6);
    p.vx+=(G.joyDX*spd-p.vx)*0.45;
    p.vy+=(G.joyDY*spd-p.vy)*0.45;
  }else{p.vx*=CFG.FRICTION;p.vy*=CFG.FRICTION;}
}

function doShoot(type){
  const p=G.controlled;if(!p||!p.hasPuck)return;
  const targetY=getAttackY(p.team==='home'?'home':'away');
  const targetX=42.5+(G.joyDX*6)+(Math.random()-0.5)*2;
  const dx=targetX-p.x,dy=targetY-p.y;
  const d=Math.sqrt(dx*dx+dy*dy)||1;
  const spd=type==='slap'?CFG.SLAP_SPD:CFG.WRIST_SPD;
  const inac=(100-p.sht)/100*2.5;
  G.puck.vx=(dx/d)*spd+(Math.random()-0.5)*inac;
  G.puck.vy=(dy/d)*spd+(Math.random()-0.5)*inac;
  G.puck.carrier=null;p.hasPuck=false;
  G.bufferedShotUntil=0;
  // Screen shake on slap shot
  if(type==='slap'){
    const mag=4;
    G.screenShake.x=(Math.random()-0.5)*mag;
    G.screenShake.y=(Math.random()-0.5)*mag;
    G.screenShake.timer=0.18;
  }
}

function doPass(){
  const p=G.controlled;if(!p||!p.hasPuck)return;
  // If joystick is active, pass in joystick direction
  if(G.joyActive&&(Math.abs(G.joyDX)>0.15||Math.abs(G.joyDY)>0.15)){
    const jd=Math.sqrt(G.joyDX*G.joyDX+G.joyDY*G.joyDY)||1;
    G.puck.vx=(G.joyDX/jd)*CFG.PASS_SPD;
    G.puck.vy=(G.joyDY/jd)*CFG.PASS_SPD;
    G.puck.carrier=null;p.hasPuck=false;
    return;
  }
  const targets=G.players.filter(x=>x.team===p.team&&x!==p&&!x.isGoalie);
  if(!targets.length)return;
  const attackY=getAttackY(p.team);
  let best=null,bestScore=-Infinity;
  targets.forEach(t=>{
    const d=dist(p.x,p.y,t.x,t.y);
    const fwd=p.team==='home'?(t.y<p.y):(t.y>p.y);
    const score=(fwd?50:0)+(100-Math.abs(t.y-attackY))*0.3-d*0.3;
    if(score>bestScore){bestScore=score;best=t;}
  });
  if(!best)return;
  const dx=best.x-p.x,dy=best.y-p.y;
  const d=Math.sqrt(dx*dx+dy*dy)||1;
  G.puck.vx=(dx/d)*CFG.PASS_SPD;G.puck.vy=(dy/d)*CFG.PASS_SPD;
  G.puck.carrier=null;p.hasPuck=false;
}

function doCheck(){
  const p=G.controlled;if(!p)return;
  const opps=G.players.filter(x=>x.team!==p.team&&!x.isGoalie);
  if(!opps.length)return;
  const cl=opps.reduce((a,b)=>dist(p.x,p.y,a.x,a.y)<dist(p.x,p.y,b.x,b.y)?a:b);
  if(dist(p.x,p.y,cl.x,cl.y)>CFG.CHECK_R)return;
  if(cl.hasPuck){cl.hasPuck=false;G.puck.carrier=null;G.puck.vx=(Math.random()-0.5)*8;G.puck.vy=(Math.random()-0.5)*8;}
  cl.stunTimer=1.5;
  const dx=cl.x-p.x,dy=cl.y-p.y;
  const d=Math.sqrt(dx*dx+dy*dy)||1;
  cl.vx=(dx/d)*6;cl.vy=(dy/d)*6;
}

function doPoke(){
  const p=G.controlled;if(!p)return;
  const carrier=G.players.find(x=>x.hasPuck&&x.team!==p.team);
  if(!carrier||dist(p.x,p.y,carrier.x,carrier.y)>CFG.POKE_R)return;
  const prob=0.45+(p.def/200);
  if(Math.random()<prob){
    carrier.hasPuck=false;G.puck.carrier=null;
    G.puck.vx=(Math.random()-0.5)*5;
    G.puck.vy=(p.team==='home'?-1:1)*(3+Math.random()*3);
  }
}

// ===================== TOUCH INPUT =====================
function hitTestButtons(x,y){
  const L=G.layout;if(!L)return null;
  // Face-off button (only active when waiting for face-off)
  if(G.state==='faceoff'){
    const fo=L.faceoff;
    if(Math.hypot(x-fo.x,y-fo.y)<=fo.r+10)return'faceoff';
  }
  // Rectangular hit test for SHOOT
  {const b=L.btns.shoot;if(x>=b.x-b.w/2-8&&x<=b.x+b.w/2+8&&y>=b.y-b.h/2-8&&y<=b.y+b.h/2+8)return'shoot';}
  // PASS or CHECK depending on possession — same position
  {const b=L.btns.pass;const hp=G.controlled&&G.controlled.hasPuck;
   if(x>=b.x-b.w/2-8&&x<=b.x+b.w/2+8&&y>=b.y-b.h/2-8&&y<=b.y+b.h/2+8)return hp?'pass':'check';}
  return null;
}

function handleButtonPress(name){
  if(name==='pass')doPass();
  else if(name==='check')doDefend();
  else if(name==='faceoff'){G.stateTimer=0;G.state='playing';}
  // 'shoot' is handled in onTouchEnd via tap/hold logic
}

function tryBufferedShot(){
  if(G.bufferedShotUntil>performance.now()&&G.controlled&&G.controlled.hasPuck){
    doShoot(G._bufferedShotType||'wrist');
    G.bufferedShotUntil=0;
  }
}

function doDefend(){
  // Smart defensive action: poke if near carrier, body check if very close
  const p=G.controlled;if(!p)return;
  const carrier=G.players.find(x=>x.hasPuck&&x.team!==p.team);
  if(carrier){
    const d=dist(p.x,p.y,carrier.x,carrier.y);
    if(d<=CFG.CHECK_R)doCheck();
    else doPoke();
  }else{
    doCheck();
  }
}

function onTouchStart(e){
  e.preventDefault();
  for(const t of e.changedTouches){
    const x=t.clientX,y=t.clientY;
    const L=G.layout;if(!L)continue;
    // Joystick zone: left 38% of screen, bottom control area
    if(x<L.W*0.38&&y>L.H-L.ctrlH){
      G.joyActive=true;G.joyTid=t.identifier;
      G.joyCX=x;G.joyCY=y;G.joyDX=0;G.joyDY=0;
      G.activeTouches[t.identifier]='joy';
    }else{
      const btn=hitTestButtons(x,y);
      if(btn){
        G.btnState[btn]=true;
        G.activeTouches[t.identifier]='btn:'+btn;
        if(btn==='shoot'){
          G.shootPressTime=performance.now();
          G.shootCharging=true;G.shootCharge=0;
          // If no puck, buffer the shot
          if(!G.controlled||!G.controlled.hasPuck){
            G.bufferedShotUntil=performance.now()+CFG.INPUT_BUFFER*1000;
          }
        }else{
          handleButtonPress(btn);
        }
      }
    }
  }
}

function onTouchMove(e){
  e.preventDefault();
  for(const t of e.changedTouches){
    const info=G.activeTouches[t.identifier];
    if(info==='joy'){
      const dx=t.clientX-G.joyCX,dy=t.clientY-G.joyCY;
      const d=Math.sqrt(dx*dx+dy*dy);
      const maxR=G.layout.joy.r;
      G.joyDX=d>maxR?(dx/d):dx/maxR;
      G.joyDY=d>maxR?(dy/d):dy/maxR;
    }
  }
}

function onTouchEnd(e){
  e.preventDefault();
  for(const t of e.changedTouches){
    const info=G.activeTouches[t.identifier];
    if(info==='joy'){G.joyActive=false;G.joyDX=0;G.joyDY=0;}
    else if(info&&info.startsWith('btn:')){
      const btn=info.split(':')[1];
      G.btnState[btn]=false;
      if(btn==='shoot'){
        const held=(performance.now()-G.shootPressTime)/1000;
        G.shootCharging=false;G.shootCharge=0;
        if(G.controlled&&G.controlled.hasPuck){
          doShoot(held>=CFG.SLAP_THRESHOLD?'slap':'wrist');
        }else{
          // Buffer the shot if near pickup time
          G.bufferedShotUntil=performance.now()+CFG.INPUT_BUFFER*1000;
          G._bufferedShotType=held>=CFG.SLAP_THRESHOLD?'slap':'wrist';
        }
      }
    }
    delete G.activeTouches[t.identifier];
  }
}

let touchBound=false;
function initTouchHandlers(){
  if(touchBound)return;touchBound=true;
  canvas.addEventListener('touchstart',onTouchStart,{passive:false});
  canvas.addEventListener('touchmove',onTouchMove,{passive:false});
  canvas.addEventListener('touchend',onTouchEnd,{passive:false});
  canvas.addEventListener('touchcancel',onTouchEnd,{passive:false});
}
function removeTouchHandlers(){
  touchBound=false;
  canvas.removeEventListener('touchstart',onTouchStart);
  canvas.removeEventListener('touchmove',onTouchMove);
  canvas.removeEventListener('touchend',onTouchEnd);
  canvas.removeEventListener('touchcancel',onTouchEnd);
}

// ===================== GAME LOOP =====================
function update(dt){
  if(G.state==='playing'){
    G.clock-=dt*CFG.GAME_SPEED;
    if(G.clock<=0){G.clock=0;G.state='period_end';G.stateTimer=2.5;}
    // Shoot charge tracking
    if(G.shootCharging)G.shootCharge+=dt;
    // Try buffered shot when puck gained
    tryBufferedShot();
    updateControlled();
    moveControlled(dt);
    updateAllAI(dt);
    updatePhysics(dt);
    // Puck trail
    if(!G.puck.carrier){
      const spd=Math.sqrt(G.puck.vx*G.puck.vx+G.puck.vy*G.puck.vy);
      if(spd>1){G.puckTrail.push({x:G.puck.x,y:G.puck.y});if(G.puckTrail.length>8)G.puckTrail.shift();}
    }else{G.puckTrail=[];}
    // Screen shake decay
    if(G.screenShake.timer>0){
      G.screenShake.timer-=dt;
      const mag=G.screenShake.timer>0?4*(G.screenShake.timer/0.18):0;
      G.screenShake.x=(Math.random()-0.5)*mag;G.screenShake.y=(Math.random()-0.5)*mag;
      if(G.screenShake.timer<=0){G.screenShake.x=0;G.screenShake.y=0;}
    }
  }else if(G.state==='faceoff'){
    G.stateTimer-=dt;
    if(G.stateTimer<=0)G.state='playing';
  }else if(G.state==='goal'){
    G.stateTimer-=dt;
    if(G.stateTimer<=0)faceOff(42.5,100);
  }else if(G.state==='period_end'){
    G.stateTimer-=dt;
    if(G.stateTimer<=0)handlePeriodEnd();
  }else if(G.state==='game_end'){
    G.stateTimer-=dt;
    if(G.stateTimer<=0)handleGameEnd();
  }
}

function gameLoop(ts){
  if(!G.running){return;}
  const dt=Math.min((ts-G.lastTime)/1000,0.05);
  G.lastTime=ts;
  update(dt);
  render();
  animFrame=requestAnimationFrame(gameLoop);
}

// ===================== INITIALIZATION =====================
function init(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  window.addEventListener('resize',()=>{
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
    if(G.running)G.layout=computeLayout();
  });
  // Prevent context menu, selection
  document.addEventListener('contextmenu',e=>e.preventDefault());
  document.addEventListener('selectstart',e=>e.preventDefault());
  // Prevent scroll on iOS
  document.addEventListener('touchmove',e=>{if(G.running)e.preventDefault();},{passive:false});

  if(FM.hasSave()){showMainMenu();}
  else{showMainMenu();}
}

document.addEventListener('DOMContentLoaded',init);
})();
</script>
